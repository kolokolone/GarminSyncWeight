<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GarminSyncWeight — Tableau de bord</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="shell header">
      <a class="brand" href="/" data-route="dashboard">
        <span class="brand-mark">GS</span>
        <span>
          <strong>GarminSyncWeight</strong>
          <small>Sync locale et contrôlée</small>
        </span>
      </a>
      <nav class="nav">
        <a href="/" data-route="dashboard" class="active">Tableau de bord</a>
        <a href="/historique" data-route="history">Historique</a>
        <a href="/statistiques" data-route="stats">Statistiques</a>
        <a href="/reglages" data-route="settings">Réglages</a>
        <a href="/logs" data-route="logs">Logs</a>
      </nav>
    </header>

    <main class="shell">
      <section id="view"></section>
    </main>

    <!-- ── Shared templates ─────────────────────────────────────── -->

    <template id="tpl-card">
      <article class="card">
        <div class="card-head">
          <div>
            <p class="eyebrow"></p>
            <h2></h2>
          </div>
          <span class="badge"></span>
        </div>
        <p class="message"></p>
        <div class="actions"></div>
      </article>
    </template>

    <template id="tpl-metric-tile">
      <div class="metric-tile">
        <span class="metric-tile-label"></span>
        <strong class="metric-tile-value"></strong>
      </div>
    </template>

    <template id="tpl-field-row">
      <tr>
        <td class="field-label"></td>
        <td class="field-withings"></td>
        <td class="field-garmin"></td>
        <td><span class="field-decision"></span></td>
      </tr>
    </template>

    <template id="tpl-log-line">
      <div class="log-line"></div>
    </template>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
