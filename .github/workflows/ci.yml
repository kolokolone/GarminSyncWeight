name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Lint
        run: uv run ruff check backend
      - name: Tests
        run: uv run pytest
      - name: Docker build
        run: docker build -t garminsyncweight:ci .
